<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Image Gallery</title>
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin: 20px 0;
            color: #2c3e50;
        }

        
        .filter-container {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            background-color: #fff;
            border: 2px solid #3498db;
            color: #3498db;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn.active, .filter-btn:hover {
            background-color: #3498db;
            color: #fff;
            box-shadow: 0 4px 15px rgba(52, 152, 217, 0.3);
        }

      
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            padding: 10px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            aspect-ratio: 4 / 3;
            background-color: #ddd;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

       
        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.08);
        }

        .item-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: #fff;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .item-overlay {
            opacity: 1;
        }

        
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 1000;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-content {
            position: relative;
            max-width: 85%;
            max-height: 85%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 4px;
            box-shadow: 0 0 25px rgba(255,255,255,0.1);
            transform: scale(0.95);
            transition: transform 0.4s ease;
        }

        .lightbox.active .lightbox-img {
            transform: scale(1);
        }

        .lightbox-caption {
            color: #fff;
            margin-top: 15px;
            font-size: 18px;
            letter-spacing: 1px;
        }

        /* Lightbox Controls */
        .close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            color: #fff;
            font-size: 35px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            font-size: 24px;
            padding: 12px 18px;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s;
            user-select: none;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .prev-btn { left: -60px; }
        .next-btn { right: -60px; }

        /* Responsive adjustments for lightbox side buttons */
        @media (max-width: 768px) {
            .nav-btn {
                top: auto;
                bottom: -60px;
                transform: none;
            }
            .prev-btn { left: 20%; }
            .next-btn { right: 20%; }
            .lightbox-caption { margin-top: 70px; }
        }
    </style>
</head>
<body>

    <h1>Visual Wonders Gallery</h1>

    <div class="filter-container">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="nature">Nature</button>
        <button class="filter-btn" data-filter="architecture">Architecture</button>
        <button class="filter-btn" data-filter="animals">Animals</button>
    </div>

    <div class="gallery-container">
        <div class="gallery-item" data-category="nature">
            <img src="image/mountain1.jpg" alt="Misty Mountains">
            <div class="item-overlay"><h3>Misty Mountains</h3></div>
        </div>
        
        <div class="gallery-item" data-category="nature">
            <img src="image/sun .jpg" alt="Sunlit Forest">
            <div class="item-overlay"><h3>Sunlit Forest</h3></div>
        </div>
        <div class="gallery-item" data-category="nature">
            <img src="image/flower.jpg" alt="flower">
            <div class="item-overlay"><h3>flower</h3></div>
        </div>


        <div class="gallery-item" data-category="nature">
            <img src="image/nature.jpg" alt="Forest">
            <div class="item-overlay"><h3>Forest</h3></div>
        </div>

        <div class="gallery-item" data-category="nature">
            <img src="image/nature (2).jpg" alt="Deep Forest">
            <div class="item-overlay"><h3>Deep Forest</h3></div>
        </div>

        <div class="gallery-item" data-category="nature">
            <img src="image/water.jpg" alt="Waterfalls">
            <div class="item-overlay"><h3>Waterfalls</h3></div>
        </div>
        
        <div class="gallery-item" data-category="architecture">
            <img src="image/download1.jpg" alt="Classic Aesthetics">
            <div class="item-overlay"><h3>Classic Aesthetics</h3></div>
        </div>
        <div class="gallery-item" data-category="architecture">
            <img src="image/architecture1.jpg" alt="Classic Aesthetics">
            <div class="item-overlay"><h3>Classic Aesthetics</h3></div>
        </div>
        <div class="gallery-item" data-category="architecture">
            <img src="image/architecture2.jpg" alt="Classic Aesthetics">
            <div class="item-overlay"><h3>Classic Aesthetics</h3></div>
        </div>



        <div class="gallery-item" data-category="architecture">
            <img src="image/download2.jpg" alt="Modern Skyscraper">
            <div class="item-overlay"><h3>Modern Skyscraper</h3></div>
        </div>

        <div class="gallery-item" data-category="animals">
            <img src="image/download3.jpg" alt="panda">
            <div class="item-overlay"><h3>panda</h3></div>
        </div>

        <div class="gallery-item" data-category="animals">
            <img src="image/puppy.webp" alt="Happy Puppy">
            <div class="item-overlay"><h3>Happy Puppy</h3></div>
        </div>

        <div class="gallery-item" data-category="animals">
            <img src="image/cat.webp" alt="Happy cat">
            <div class="item-overlay"><h3>Happy cat</h3></div>
        </div>

        <div class="gallery-item" data-category="animals">
            <img src="image/dog.webp" alt="Dog">
            <div class="item-overlay"><h3>Dog</h3></div>
        </div>

        <div class="gallery-item" data-category="animals">
            <img src="image/lion.webp" alt="Lion">
            <div class="item-overlay"><h3>Lion</h3></div>
        </div>

        <div class="gallery-item" data-category="animals">
            <img src="image/tiger.jpg" alt="Tiger">
            <div class="item-overlay"><h3>Tiger</h3></div>
        </div>
    </div>

    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <button class="close-btn" id="close-btn">&times;</button>
            <button class="nav-btn prev-btn" id="prev-btn">&#10094;</button>
            <img src="" alt="" class="lightbox-img" id="lightbox-img">
            <button class="nav-btn next-btn" id="next-btn">&#10095;</button>
            <div class="lightbox-caption" id="lightbox-caption"></div>
        </div>
    </div>

    <script>
        // DOM Elements
        const galleryItems = document.querySelectorAll('.gallery-item');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCaption = document.getElementById('lightbox-caption');
        const closeBtn = document.getElementById('close-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        let currentIndex = 0;
        let activeItems = [...galleryItems]; // Tracks visible elements dynamically

        // --- LIGHTBOX LOGIC ---
        function showImage(index) {
            if (index < 0) index = activeItems.length - 1;
            if (index >= activeItems.length) index = 0;
            
            currentIndex = index;
            const imgTarget = activeItems[currentIndex].querySelector('img');
            const titleTarget = activeItems[currentIndex].querySelector('h3');

            lightboxImg.src = imgTarget.src;
            lightboxImg.alt = imgTarget.alt;
            lightboxCaption.textContent = titleTarget.textContent;
        }

        function openLightbox(e) {
            const clickedItem = e.currentTarget;
            const index = activeItems.indexOf(clickedItem);
            
            lightbox.classList.add('active');
            showImage(index);
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
        }

        // Click Event Listeners
        galleryItems.forEach(item => item.addEventListener('click', openLightbox));
        closeBtn.addEventListener('click', closeLightbox);
        nextBtn.addEventListener('click', () => showImage(currentIndex + 1));
        prevBtn.addEventListener('click', () => showImage(currentIndex - 1));

        // Close on Backdrop Click
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });

        // Keyboard Navigation Support
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'ArrowRight') showImage(currentIndex + 1);
            if (e.key === 'ArrowLeft') showImage(currentIndex - 1);
            if (e.key === 'Escape') closeLightbox();
        });

        // --- FILTER LOGIC ---
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.filter-btn.active').classList.remove('active');
                btn.classList.add('active');

                const filterValue = btn.getAttribute('data-filter');
                activeItems = [];

                galleryItems.forEach(item => {
                    const itemCategory = item.getAttribute('data-category');
                    if (filterValue === 'all' || filterValue === itemCategory) {
                        item.style.display = 'block';
                        activeItems.push(item);
                    } else {
                        item.style.display = 'none';
                    }
                });
            });
        });
    </script>
</body>
</html>
